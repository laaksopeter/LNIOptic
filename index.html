<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LNI OPTIC</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=refresh" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-wrapper">
        <div id="sidebar-overlay" class="overlay"></div>
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo-group"><div class="logo-accent"></div><h1>LNI OPTIC</h1></div>
                <button id="close-sidebar" class="mobile-close-btn">&times;</button>
            </div>
            <div class="nav-section">
                <label>Main</label>
                <ul class="nav-links"><li class="active" data-page="home">Dashboard</li></ul>
            </div>
            <div class="nav-section">
                <label>Inventory</label>
                <ul class="nav-links">
                    <li data-page="sheet_crop">Sheet Cropper</li>
                    <li data-page="struct_crop">Structural Cropper</li>
                    <li data-page="full_sheet">Full Sheet Stock</li>
                    <li data-page="full_struct">Full Structural</li>
                </ul>
            </div>
            <div class="nav-section">
                <label>Workflow</label>
                <ul class="nav-links"><li data-page="wip_parts">Part Tracking</li></ul>
            </div>
            <div class="sidebar-footer"><button id="logout-btn" class="btn-secondary">Sign Out</button></div>
        </nav>
        <main class="content-area">
            <div id="auth-container" class="auth-card">
                <h1 class="main-title">Laser North Inc. Optic</h1>
                <button id="login-btn" class="btn-primary">Employee sign in</button>
                <p class="auth-notice">Authorized personnel only - property of Laser North Inc.</p>
            </div>
            <div id="app-interface" style="display:none; width: 100%;">
                <header class="top-nav">
                    <button id="menu-toggle" class="menu-btn">☰</button>
                    <h2 id="page-title">Dashboard</h2>
                    <div style="display:flex; align-items:center; gap:10px;">
                        <button id="global-sync" class="sync-btn" title="Refresh Data"><span class="material-symbols-outlined">refresh</span></button>
                        <div class="user-pill"><span id="user-display">--</span></div>
                    </div>
                </header>

                <div id="home-view">
                    <div class="stats-grid">
                        <div class="stat-card" onclick="refreshStats()"><span class="stat-label">Sheet Crops</span><span id="stat-sheet-crop" class="stat-val">--</span></div>
                        <div class="stat-card" onclick="refreshStats()"><span class="stat-label">Struct Crops</span><span id="stat-struct-crop" class="stat-val">--</span></div>
                        <div class="stat-card highlight" onclick="refreshStats()"><span class="stat-label">WIP Parts</span><span id="stat-wip" class="stat-val">--</span></div>
                        <div class="stat-card" onclick="refreshStats()"><span class="stat-label">Full Stock</span><span id="stat-full" class="stat-val">--</span></div>
                    </div>
                </div>

                <div id="main-terminal" class="terminal-grid" style="display:none;">
                    <section class="card form-container">
                        <form id="material-form">
                            <div class="field"><label id="label-grade">Category</label><select id="mat-name"></select></div>
                            <div class="field-group">
                                <div class="field"><label id="label-dim">DIM</label><input type="text" id="dim-input" required></div>
                                <div class="field"><label id="label-len">SIZE</label><input type="text" id="len-input" required></div>
                            </div>
                            <div class="field-group">
                                <div class="field"><label id="label-cert">CERT #</label><input type="text" id="cert-num" required></div>
                                <div class="field"><label id="label-loc">LOC</label><input type="text" id="location" required></div>
                            </div>
                            <div class="field"><label id="label-notes">NOTES</label><input type="text" id="other-info"></div>
                            <button type="submit" id="submit-btn" class="btn-primary">Enter</button>
                        </form>
                        <div id="bulk-import-zone" style="margin-top:1rem;">
                            <label class="btn-secondary" style="display:block; text-align:center; cursor:pointer;">
                                Bulk Import
                                <input type="file" id="bulk-csv-input" accept=".csv" style="display:none;">
                            </label>
                        </div>
                    </section>
                    
                    <section class="card list-container">
                        <input type="text" id="inventory-search" placeholder="Search Part #, Cert, or Size..." class="search-bar">
                        <div id="inventory-list" class="item-feed"></div>
                    </section>
                </div>
            </div>
        </main>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
