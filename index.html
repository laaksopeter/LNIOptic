<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LNI OPTIC</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-wrapper">
        <nav class="sidebar" id="sidebar" style="display:none;">
            <div class="nav-header">
                <div class="logo-accent"></div>
                <h1>LNI OPTIC</h1>
            </div>
            <ul class="nav-links">
                <li class="active" data-page="home">Dashboard</li>
                <hr>
                <li data-page="sheet_crop">Sheet Cropper</li>
                <li data-page="struct_crop">Structural Cropper</li>
                <li data-page="full_sheet">Full Sheet Stock</li>
                <li data-page="full_struct">Full Structural</li>
                <hr>
                <li data-page="wip_parts">Part Workflow</li>
            </ul>
            <button id="logout-btn" class="btn-logout">Exit Session</button>
        </nav>

        <main class="content-area">
            <div id="auth-container" class="card login-card">
                <h2>LNI OPTIC</h2>
                <button id="login-btn" class="google-signin">Operator Sign-In</button>
            </div>

            <div id="app-interface" style="display:none; width: 100%;">
                <header class="top-bar">
                    <h2 id="page-title">Dashboard</h2>
                    <span id="user-display">Operator</span>
                </header>

                <div id="home-view" class="card">
                    <h3>Welcome to LNI Optic</h3>
                    <p>Select a category from the sidebar to manage inventory.</p>
                </div>

                <div id="main-terminal" class="dashboard-grid" style="display:none;">
                    <div class="card">
                        <form id="material-form">
                            <div class="input-group">
                                <label id="label-grade">Category</label>
                                <select id="mat-name"></select>
                            </div>
                            <div class="input-group">
                                <label id="label-dim">DIM</label>
                                <input type="text" id="dim-input" required>
                            </div>
                            <div class="input-group">
                                <label id="label-len">SIZE</label>
                                <input type="text" id="len-input" required>
                            </div>
                            <div class="input-group">
                                <label id="label-cert">CERT</label>
                                <input type="text" id="cert-num" required>
                            </div>
                            <div class="input-group">
                                <label id="label-loc">LOCATION</label>
                                <input type="text" id="location" required>
                            </div>
                            <button type="submit" id="submit-btn" class="btn-submit">Add Entry</button>
                        </form>
                    </div>
                    <div class="card">
                        <div id="inventory-list"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
